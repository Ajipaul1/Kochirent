<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KochiNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="brand" href="#" aria-label="KochiNest home">
                <img class="brand__logo" src="assets/kochinest-elegant-logo.png" alt="KochiNest logo">
            </a>

            <div class="header-location" aria-label="Current location">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 21s6-5.5 6-11a6 6 0 1 0-12 0c0 5.5 6 11 6 11Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
                    <circle cx="12" cy="10" r="2.4" fill="currentColor"/>
                </svg>
                <span class="header-location__text">Kochi, Kerala</span>
            </div>

            <button class="language-toggle" type="button" aria-pressed="false" aria-label="Switch language between English and Malayalam">
                <span class="language-toggle__track">
                    <span class="language-toggle__option is-active">EN</span>
                    <span class="language-toggle__option">ML</span>
                </span>
            </button>
        </div>
    </header>

    <script src="assets/script.js"></script>
</body>
</html>
